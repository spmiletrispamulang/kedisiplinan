<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pendataan Terlambat | SMK Letris Pamulang</title>
    
    <!-- Memanggil Icon Web (Favicon) -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">

    <!-- Library untuk Generate PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo-container">
            <!-- Menampilkan Logo -->
            <img src="logo.png" alt="Logo SMK Letris" class="logo-img">
            <div class="logo-text">SMK LETRIS <span>PAMULANG</span></div>
        </div>
        <div class="nav-menu">
            <button class="nav-btn active" onclick="navigate('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="navigate('input')">Input</button>
            <button class="nav-btn" onclick="navigate('riwayat')">Riwayat</button>
        </div>
    </nav>

    <main>
        <!-- Halaman Dashboard (Tetap Sama) -->
        <section id="dashboard" class="page active">
            <h2>Dashboard Data Siswa</h2>
            <div class="cards">
                <div class="card blue">
                    <h3>Total Siswa</h3>
                    <h1 id="dash-total">Loading...</h1>
                </div>
                <div class="card yellow">
                    <h3 class="text-blue">Laki-Laki</h3>
                    <h1 id="dash-l" class="text-blue">...</h1>
                </div>
                <div class="card blue">
                    <h3>Perempuan</h3>
                    <h1 id="dash-p">...</h1>
                </div>
            </div>
        </section>

        <!-- Halaman Input (Tetap Sama) -->
        <section id="input" class="page hidden">
            <h2>Pendataan Siswa Terlambat</h2>
            
            <div class="form-card">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Cari Nama atau Kelas...">
                    <button class="btn btn-yellow text-blue" onclick="searchStudent()">Cari</button>
                </div>
                
                <div id="searchResults" class="results-box hidden"></div>

                <div id="selectedStudentForm" class="hidden">
                    <hr>
                    <h3 class="mt-2 text-blue">Formulir Keterlambatan</h3>
                    <form id="lateForm" onsubmit="submitLateData(event)">
                        <input type="hidden" id="form-nis">
                        <input type="hidden" id="form-walikelas"> <!-- Input tersembunyi untuk Wali Kelas -->
                        <div class="info-group">
                            <p><strong>Nama: </strong> <span id="form-nama"></span></p>
                            <p><strong>Kelas: </strong> <span id="form-kelas"></span></p>
                            <p><strong>Wali Kelas: </strong> <span id="form-wali-tampil"></span></p> <!-- Menampilkan Wali Kelas -->
                        </div>
                        
                        <div class="input-group">
                            <label>Catatan Khusus (Opsional):</label>
                            <input type="text" id="form-catatan" placeholder="Cth: Macet, bangun kesiangan...">
                        </div>

                        <div class="input-group">
                            <label>Foto Bukti (Opsional):</label>
                            <input type="file" id="form-foto" accept="image/*">
                        </div>

                        <button type="submit" class="btn btn-blue w-100" id="btnSubmit">Simpan Pendataan</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Halaman Riwayat (Diperbarui dengan Tombol PDF & Kolom NIS) -->
        <section id="riwayat" class="page hidden">
            <h2>Riwayat Keterlambatan</h2>
            <div class="form-card">
                <label style="font-weight:bold; color:var(--primary-blue)">Filter Tanggal & Cetak Laporan:</label>
                <div class="action-group">
                    <input type="date" id="filterDate">
                    <button class="btn btn-yellow text-blue" onclick="loadHistory()">Tampilkan</button>
                    <button class="btn btn-blue" onclick="downloadPDF()">Download PDF</button>
                </div>
            </div>

            <div class="table-container mt-2">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>NIS</th>
                            <th>Nama Siswa</th>
                            <th>Kelas</th>
                            <th>Wali Kelas</th> <!-- Kolom Baru -->
                            <th>Catatan</th>
                            <th>Foto</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- Data JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
